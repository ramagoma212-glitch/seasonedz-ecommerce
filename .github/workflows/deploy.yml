name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let in-progress runs finish rather
# than cancelling a live deploy mid-way.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # VITE_API_BASE_URL is not secret — it's baked into the built JS
        # either way (any visitor's browser can see it), so it's safe to
        # set directly in the workflow rather than as a repo secret. See
        # VERSION_2_INTEGRATION_NOTES.md.
        #
        # VITE_PAYFAST_ENABLED is explicitly "false" here for production
        # safety/clarity (Version 3 pre-merge hardening) — the frontend
        # code already defaults to false when this is unset, but setting
        # it explicitly means production safety doesn't depend on a
        # reader knowing that default. See VERSION_3_PRE_MERGE_SAFETY_CHECK.md.
        env:
          VITE_API_BASE_URL: https://seasonedz-ecommerce.onrender.com/api
          VITE_PAYFAST_ENABLED: "false"
        run: npm run build

      - name: Generate static route files and sitemap.xml for SEO
        # Milestone 88C found every route except "/" returned HTTP 404
        # (served correctly via the 404.html fallback below, but a 404
        # status risks Google excluding the page from its index
        # regardless of what content renders client-side). This script
        # copies the built index.html into real per-route folders
        # (dist/shop/index.html, dist/product/<slug>/index.html, ...)
        # for public pages only, so GitHub Pages serves those with a
        # genuine 200 (Version 7, Milestone 88D), and also writes
        # dist/sitemap.xml listing those same real product/blog URLs
        # (Version 7, Milestone 89). Needs network access to the live
        # products API, which this runner has.
        run: node scripts/generate-static-routes.mjs

      - name: Add SPA fallback for GitHub Pages (404.html)
        # GitHub Pages is static hosting with no server-side rewrites —
        # a direct visit to a real path like /shop returns Pages' own
        # 404 unless a 404.html exists. Copying the built index.html to
        # 404.html makes Pages serve the same app shell for any
        # unmatched path (Version 7, Milestone 88A path-routing
        # migration); router.js then reads window.location.pathname on
        # load and renders the right page, exactly as it already does
        # for a normal in-app navigation.
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
