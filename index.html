<!DOCTYPE html>
<html lang="en-ZA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seasonedz Group | Educational Colouring Books &amp; Creative Supplies</title>
    <meta
      name="description"
      content="Educational colouring books, Bible colouring books, mindfulness colouring books, markers and crayons for parents, teachers, schools and churches."
    />

    <!--
      Version 7, Milestone 90: favicon/icon set, cropped from the
      existing Seasonedz Group "S" logo mark (public/images/
      logo-placeholder.jpeg) — see scripts used to generate these for
      the exact crop. favicon.svg embeds the same raster artwork in an
      SVG wrapper (no vector source exists for this logo, and
      auto-tracing it risked distorting the brand mark), so browsers
      that support type="image/svg+xml" favicons get the same crisp
      512px art; the .ico fallback covers everything else.
    -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!--
      Version 7, Milestone 89: static defaults for the very first paint
      (before any JS runs), for the homepage itself, and as a fallback
      for the brief moment before router.js's first render — js/seo.js
      then sets the real per-route title, description, robots and
      (Version 7, Milestone 99) canonical href on every navigation,
      overriding these. robots here matches seo.js's own default
      ("index, follow"); private/transactional routes get "noindex,
      nofollow" from seo.js at render time, same as before.
    -->
    <link rel="canonical" href="https://www.seasonedzgroup.co.za/" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#e07a3f" />

    <meta property="og:site_name" content="Seasonedz Group" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Seasonedz Group | Educational Colouring Books &amp; Creative Supplies" />
    <meta
      property="og:description"
      content="Educational colouring books, Bible colouring books, mindfulness colouring books, markers and crayons for parents, teachers, schools and churches."
    />
    <meta property="og:url" content="https://www.seasonedzgroup.co.za/" />
    <meta property="og:image" content="https://www.seasonedzgroup.co.za/images/hero-banner.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Seasonedz Group | Educational Colouring Books &amp; Creative Supplies" />
    <meta
      name="twitter:description"
      content="Educational colouring books, Bible colouring books, mindfulness colouring books, markers and crayons for parents, teachers, schools and churches."
    />
    <meta name="twitter:image" content="https://www.seasonedzgroup.co.za/images/hero-banner.jpg" />

    <!--
      Version 6, Milestone 48: site-wide Organization structured data.
      Static and safe to ship unconditionally (no per-page data, no
      invented facts) — per-product Product structured data is added
      dynamically by src/pages/productDetails.js via src/js/seo.js.
      Version 7, Milestone 89: logo is now a fully-qualified URL, per
      Google's structured-data guidance (a relative URL isn't
      guaranteed to resolve correctly for every consumer of this data).
      Version 7, Milestone 90: logo now points at icon-512.png (the
      same tight square crop of the brand's "S" mark used for the
      favicon/app icons) instead of the full logo-with-wordmark image —
      Google's guidance for this field asks for a clean square image,
      and the full logo file has a lot of surrounding whitespace around
      a non-square composition.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Seasonedz Group",
        "description": "Educational colouring books, Bible colouring books, mindfulness colouring books, markers and crayons for parents, teachers, schools and churches.",
        "logo": "https://www.seasonedzgroup.co.za/icon-512.png"
      }
    </script>

    <!--
      Version 7, Milestone 89: site-wide WebSite structured data, with
      a SearchAction pointing at the real, working /search route (see
      src/pages/searchResults.js) — safe to include since it's a real,
      functioning search, not a fabricated capability; /search itself
      stays noindex (Version 7, Milestone 88A) independently of this,
      since noindex only affects whether the results page is indexed
      as its own page, not whether it can be used as a SearchAction
      target.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Seasonedz Group",
        "url": "https://www.seasonedzgroup.co.za/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.seasonedzgroup.co.za/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/css/base.css" />
    <link rel="stylesheet" href="/src/css/layout.css" />
    <link rel="stylesheet" href="/src/css/components.css" />
    <link rel="stylesheet" href="/src/css/pages.css" />
    <link rel="stylesheet" href="/src/css/responsive.css" />
  </head>
  <body>
    <div id="app"></div>

    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
